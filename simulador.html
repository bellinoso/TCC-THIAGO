<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Braco Robotico - UFRJ</title>
    <!-- Babylon.js -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: row;
        }

        #mainContent {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #canvasZone {
            width: 100%;
            height: 65%;
        }

        #chartsZone {
            width: 100%;
            height: 35%;
            display: flex;
            justify-content: space-around
        }

        .chartContainer {
            width: 33%;
            height: 100%;
            position: relative;
        }

        .chartContainer canvas {
            width: 100% !important;
            height: 100% !important;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #tabBar {
            width: 100%;
            height: 20px;
            display: flex;
            background: #eee;
            border-top: 1px solid #ccc;
        }
        .tabButton {
            flex: 1;
            border: none;
            background: none;
            font-size: 0.7em;
            cursor: pointer;
            padding: 2px 0;
            transition: background 0.2s;
        }
        .tabButton.active {
            background: #ddd;
            font-weight: bold;
        }
        #tabContent {
            width: 100%;
            height: calc(35% - 40px);
            position: relative;
        }
        .tabPane {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .tabPane.active {
            display: block;
        }

        #tab-programming {
            background: #f8fafc;
            color: #172033;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .programming-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .programming-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 8px;
            border-bottom: 1px solid #cbd5e1;
            background: #fff;
            flex-wrap: wrap;
        }

        .programming-toolbar-label {
            font-size: 12px;
            font-weight: 700;
        }

        #programJointSelector {
            display: flex;
            gap: 4px;
        }

        .joint-selector-button {
            min-width: 38px;
            height: 22px;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            background: #fff;
            color: #334155;
            cursor: pointer;
        }

        .joint-selector-button.active {
            border-color: #2563eb;
            background: #2563eb;
            color: #fff;
        }

        .joint-selector-button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        #programStatus {
            margin-left: auto;
            min-height: 16px;
            font-size: 12px;
            color: #475569;
        }

        #programStatus.error {
            color: #b91c1c;
            font-weight: 700;
        }

        #programTableContainer {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 3px 8px 6px;
        }

        .programming-empty {
            display: grid;
            height: 100%;
            place-items: center;
            color: #64748b;
            font-size: 13px;
            text-align: center;
        }

        .programming-table {
            width: 100%;
            min-width: 680px;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 12px;
        }

        .programming-table th,
        .programming-table td {
            border-right: 1px solid #cbd5e1;
            border-bottom: 1px solid #cbd5e1;
            padding: 2px 4px;
            text-align: center;
            line-height: 16px;
        }

        .programming-table th:first-child,
        .programming-table td:first-child {
            border-left: 1px solid #cbd5e1;
        }

        .programming-table thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            border-top: 1px solid #cbd5e1;
            background: #e2e8f0;
            color: #1e293b;
            white-space: nowrap;
        }

        .programming-table tbody tr {
            background: #fff;
            cursor: pointer;
        }

        .programming-table tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        .programming-table tbody tr.selected {
            background: #dbeafe;
        }

        .programming-table input {
            width: 100%;
            min-width: 88px;
            box-sizing: border-box;
            height: 22px;
            padding: 1px 4px;
            border: 1px solid #94a3b8;
            border-radius: 3px;
            text-align: right;
            font: inherit;
            background: #fff;
        }

        .programming-table input:disabled {
            border-color: transparent;
            background: transparent;
            color: #64748b;
        }

        .programming-table input.invalid {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .velocity-field {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .velocity-source {
            color: #64748b;
            font-size: 9px;
            white-space: nowrap;
        }

        .use-suggested-velocity {
            height: 22px;
            padding: 0 7px;
            border: 1px solid #2563eb;
            border-radius: 3px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 10px;
            white-space: nowrap;
            cursor: pointer;
        }

        .use-suggested-velocity:hover:not(:disabled) {
            background: #dbeafe;
        }

        .use-suggested-velocity:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }
    </style>
</head>
<body>
    <div id="mainContent">
        <div id="canvasZone"><canvas id="renderCanvas"></canvas></div>
        <div id="tabBar">
            <button class="tabButton active" data-tab="charts">Gráficos</button>
            <button class="tabButton" data-tab="programming">Programação</button>
            <button class="tabButton" data-tab="instructions">Instruções</button>
            <button class="tabButton" data-tab="data">Dados</button>
            <button id="minimizeTabContent" title="Minimizar gráficos">✕</button>
        </div>
        <div id="tabContent">
            <div class="tabPane active" id="tab-charts">
                <div style="width:100%;height:100%;display:flex;justify-content:space-around">
                    <div class="chartContainer"><canvas id="gPos"></canvas></div>
                    <div class="chartContainer"><canvas id="gVel"></canvas></div>
                    <div class="chartContainer"><canvas id="gAce"></canvas></div>
                </div>
            </div>
            <div class="tabPane" id="tab-programming">
                <div class="programming-layout">
                    <div class="programming-toolbar">
                        <span class="programming-toolbar-label">Junta:</span>
                        <div id="programJointSelector" aria-label="Selecionar junta"></div>
                        <span id="programStatus" aria-live="polite"></span>
                    </div>
                    <div id="programTableContainer"></div>
                </div>
            </div>
            <div class="tabPane" id="tab-instructions">
                <div style="padding:20px;">Instruções para uso do sistema.</div>
            </div>
            <div class="tabPane" id="tab-data">
            </div>
        </div>
    </div>
    <script src="aux_func.js"></script>
    <script src="grafico.js"></script>
    <script src="trajectory_math.js"></script>
    <script src="scene.js"></script>
</body>
</html>
